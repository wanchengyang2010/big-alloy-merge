name: ✨ 功能请求
description: 提出新功能、改进建议或创意想法
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      content: |
        有什么想法?🤩
        描述你希望添加的功能或改进,我们会认真评估每一个建议!

  - type: dropdown
    id: type
    attributes:
      label: 请求类型
      options:
        - 🎮 新玩法 / 游戏机制
        - 🎨 视觉效果 / UI 改进
        - 🔊 音效 / 音乐
        - 🧪 物理引擎参数
        - ⚙️ 新模式 / 自定义功能
        - 📦 打包 / 安装 / 部署
        - 📚 文档 / 教程
        - 🐛 性能优化
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 你想解决的问题?
      description: 当前有什么不方便 / 不满意的地方?
      placeholder: |
        例如:现在合成到钇钾后游戏就结束了,但我想继续玩...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你设想的解决方案?
      description: 描述你希望的功能具体怎么工作
      placeholder: |
        例如:合成钇钾后清空容器但保留分数,玩家可以继续向更高分挑战。
        或者:加入"无尽模式"选项,关掉溢出线检查。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案?
      description: 有没有其他可能的实现方式?为什么这个方案更好?

  - type: textarea
    id: art
    attributes:
      label: 草图 / 截图 / 参考
      description: 如果有相关的设计稿、参考游戏截图、流程图等,贴上来!

  - type: checkboxes
    id: contribution
    attributes:
      label: 贡献意愿
      description: 你愿意自己实现这个功能吗?
      options:
        - label: 我愿意自己提 PR 实现这个功能
        - label: 我可以帮忙测试 / 提供反馈
        - label: 只是建议,没时间参与开发